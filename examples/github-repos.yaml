version: 1
baseUrl: https://api.github.com
headers:
  Accept: application/vnd.github+json
  X-GitHub-Api-Version: "2022-11-28"

requests:
  # Fetch all public repos for a user, keep only relevant fields
  octocat-repos:
    path: /users/octocat/repos
    params:
      sort: updated
      per_page: 30
    transform:
      - filter:
          field: fork
          op: eq
          value: false
      - pick:
          - id
          - name
          - description
          - html_url
          - stargazers_count
          - language
          - updated_at

  # Fetch repo topics — returns an object, so we just pick the topics array
  octocat-starred:
    path: /users/octocat/starred
    params:
      per_page: 10
    transform:
      - pick:
          - full_name
          - description
          - html_url
          - stargazers_count
